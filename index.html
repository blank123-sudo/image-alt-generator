<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI Image Alt Text Generator</title>
    <style>
        :root {
            --bg-color: #f4f6fa;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent: #2563eb; /* Modern vibrant Blue */
            --accent-hover: #1d4ed8;
            --accent-light: #eff6ff;
            --border: #e2e8f0;
            --success: #10b981;
            --radius-lg: 16px;
            --radius-md: 10px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at top right, #e0e7ff 0%, var(--bg-color) 40%);
            color: var(--text-main);
            margin: 0;
            padding: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            background: var(--card-bg);
            padding: 2.5rem 2rem;
            border-radius: var(--radius-lg);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 
                        0 8px 10px -6px rgba(0, 0, 0, 0.05),
                        0 0 0 1px rgba(0, 0, 0, 0.01);
            width: 100%;
            max-width: 520px;
            box-sizing: border-box;
            transition: var(--transition);
        }

        h1 {
            font-size: 1.85rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin-top: 0;
            margin-bottom: 0.5rem;
            text-align: center;
            background: linear-gradient(135deg, #1e3a8a 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 2.25rem;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .config-section {
            margin-bottom: 1.75rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #475569;
        }

        input[type="password"] {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            box-sizing: border-box;
            font-size: 0.95rem;
            color: var(--text-main);
            background-color: #f8fafc;
            transition: var(--transition);
        }

        input[type="password"]:focus {
            outline: none;
            border-color: var(--accent);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(37, 99, 233, 0.12);
        }

        .drop-zone {
            border: 2px dashed #cbd5e1;
            border-radius: var(--radius-lg);
            padding: 2.5rem 1.5rem;
            text-align: center;
            cursor: pointer;
            background-color: #f8fafc;
            transition: var(--transition);
            margin-bottom: 1.75rem;
        }

        .drop-zone:hover, .drop-zone.drag-over {
            border-color: var(--accent);
            background-color: var(--accent-light);
        }

        .drop-zone p {
            margin: 0;
            color: #475569;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .drop-zone strong {
            color: var(--accent);
            font-weight: 600;
        }

        #file-input {
            display: none;
        }

        #preview-container {
            display: none;
            margin-bottom: 1.75rem;
            text-align: center;
            border-radius: var(--radius-md);
            overflow: hidden;
            background-color: #f1f5f9;
            padding: 0.5rem;
            border: 1px solid var(--border);
        }

        #image-preview {
            display: block;
            max-width: 100%;
            max-height: 280px;
            margin: 0 auto;
            border-radius: calc(var(--radius-md) - 4px);
            object-fit: contain;
        }

        button {
            width: 100%;
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 0.95rem;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(37, 99, 233, 0.2);
            transition: var(--transition);
        }

        button:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(37, 99, 233, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background-color: #cbd5e1;
            color: #94a3b8;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
            opacity: 1;
        }

        #result-container {
            display: none;
            margin-top: 2rem;
            padding: 1.25rem 1.5rem;
            background-color: #f8fafc;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            border-left: 4px solid var(--accent);
            animation: fadeIn 0.3s ease;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .result-header h3 {
            margin: 0;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        .copy-btn {
            background: none;
            color: var(--accent);
            border: none;
            padding: 0.25rem 0.5rem;
            width: auto;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: none;
            border-radius: 4px;
        }
        
        .copy-btn:hover {
            background-color: var(--accent-light);
            color: var(--accent-hover);
            text-decoration: none;
            transform: none;
            box-shadow: none;
        }

        #alt-text-output {
            margin: 0;
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text-main);
            font-weight: 500;
        }

        .status-message {
            text-align: center;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--accent);
            margin-top: 1.25rem;
            display: none;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        @media (max-width: 480px) {
            body { padding: 1rem; }
            .container { padding: 1.75rem 1.25rem; }
            h1 { font-size: 1.5rem; }
            .drop-zone { padding: 2rem 1rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Gemini Alt Image Text Generator</h1>
    <p class="subtitle">Get fast, contextual accessibility text powered by Google Gemini.</p>

    <div class="config-section">
        <label for="api-key">Gemini API Key:</label>
        <input type="password" id="api-key" placeholder="AIzaSy..." />
        <small style="color: var(--text-muted); display: block; margin-top: 0.4rem; font-size: 0.8rem;">
            Get a free key from <a href="https://aistudio.google.com/" target="_blank" style="color: var(--accent); text-decoration: none; font-weight: 500;">Google AI Studio</a>
        </small>
    </div>

    <div class="drop-zone" id="drop-zone">
        <p>Drag & drop your image here, <strong>paste an image link</strong>, or browse</p>
        <input type="file" id="file-input" accept="image/*">
    </div>

    <div id="preview-container">
        <img id="image-preview" src="" alt="User uploaded preview">
    </div>

    <button id="generate-btn" disabled>Generate Alt Text</button>

    <div class="status-message" id="status-message">Gemini is looking closely at your image...</div>

    <div id="result-container">
        <div class="result-header">
            <h3>Suggested Alt Text</h3>
            <button class="copy-btn" id="copy-btn">Copy</button>
        </div>
        <p id="alt-text-output"></p>
    </div>
</div>

<script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const previewContainer = document.getElementById('preview-container');
    const imagePreview = document.getElementById('image-preview');
    const generateBtn = document.getElementById('generate-btn');
    const statusMessage = document.getElementById('status-message');
    const resultContainer = document.getElementById('result-container');
    const altTextOutput = document.getElementById('alt-text-output');
    const copyBtn = document.getElementById('copy-btn');
    const apiKeyInput = document.getElementById('api-key');

    let selectedFile = null;

    dropZone.addEventListener('click', () => fileInput.click());

    ['dragenter', 'dragover'].forEach(eventName => {
        dropZone.addEventListener(eventName, (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        }, false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
        }, false);
    });

    dropZone.addEventListener('drop', async (e) => {
        const dt = e.dataTransfer;
        const files = dt.files;
        
        // 1. Prioritize a direct local file drops
        if (files.length) {
            handleFile(files[0]);
        } else {
            // 2. Fall back to reading web elements / URLs
            let imageUrl = dt.getData('text/uri-list');
            const html = dt.getData('text/html');

            if (!imageUrl && html) {
                // Parse dropped HTML snippet to pluck an img src out if available
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const img = doc.querySelector('img');
                if (img && img.src) imageUrl = img.src;
            }

            if (imageUrl) {
                handleWebImageUrl(imageUrl);
            } else {
                alert("Could not process dropped item. Try local upload or direct link.");
            }
        }
    });

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length) handleFile(e.target.files[0]);
    });

    function handleFile(file) {
        if (!file.type.startsWith('image/')) {
            alert('Please select a valid image file.');
            return;
        }
        selectedFile = file;
        
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onloadend = () => {
            imagePreview.src = reader.result;
            previewContainer.style.display = 'block';
            generateBtn.disabled = false;
            resultContainer.style.display = 'none';
        }
    }

    // Handles images dragged over directly from other web browser windows or tabs
    async function handleWebImageUrl(url) {
        const originalStatus = statusMessage.textContent;
        statusMessage.textContent = "Loading image from website context...";
        statusMessage.style.display = 'block';
        previewContainer.style.display = 'none';
        resultContainer.style.display = 'none';
        generateBtn.disabled = true;

        try {
            // Process cross-origin image urls into local browser dataURL representations
            const base64Str = await convertImgToDataURL(url);
            imagePreview.src = base64Str;
            
            // Assign a standard matching mimeType context structure
            let mimeType = 'image/jpeg';
            if (url.includes('.png')) mimeType = 'image/png';
            else if (url.includes('.webp')) mimeType = 'image/webp';
            else if (url.includes('.gif')) mimeType = 'image/gif';
            
            selectedFile = { type: mimeType };
            
            previewContainer.style.display = 'block';
            generateBtn.disabled = false;
        } catch (error) {
            alert("Security Notice: This website prevents outside applications from copying its images directly (CORS protection). Please right-click save the image and drop it in manually instead!");
        } finally {
            statusMessage.textContent = originalStatus;
            statusMessage.style.display = 'none';
        }
    }

    function convertImgToDataURL(url) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.crossOrigin = 'Anonymous'; // Forces standard browser CORS check pipeline
            img.onload = function() {
                const canvas = document.createElement('canvas');
                canvas.width = this.naturalWidth;
                canvas.height = this.naturalHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(this, 0, 0);
                try {
                    const dataURL = canvas.toDataURL('image/jpeg');
                    resolve(dataURL);
                } catch (e) {
                    reject(e); // Throws security exception if strict site policies intervene
                }
            };
            img.onerror = () => reject(new Error("Image fetch breakdown"));
            img.src = url;
        });
    }

    // Call the Gemini API
    generateBtn.addEventListener('click', async () => {
        const apiKey = apiKeyInput.value.trim();
        if (!apiKey) {
            alert('Please enter your Gemini API Key.');
            return;
        }

        if (!selectedFile || !imagePreview.src) return;

        generateBtn.disabled = true;
        statusMessage.style.display = 'block';
        resultContainer.style.display = 'none';

        try {
            const base64Data = imagePreview.src.split(',')[1];
            const mimeType = selectedFile.type;

            const payload = {
                contents: [{
                    parts: [
                        { text: "Provide a clean, concise, descriptive alt text phrase for this image for web accessibility purposes. Describe the focal point, colors, setting, and text if present. Do not include commentary, labels, metadata, or introductory text like 'An image of...' or 'This image shows...'." },
                        { inline_data: { mime_type: mimeType, data: base64Data } }
                    ]
                }]
            };

            const response = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${apiKey}`,
                {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                }
            );

            const result = await response.json();

            if (response.ok && result.candidates?.[0]?.content?.parts?.[0]?.text) {
                let altText = result.candidates[0].content.parts[0].text.trim();
                altText = altText.replace(/^["']|["']$/g, '');
                altTextOutput.textContent = altText;
                resultContainer.style.display = 'block';
            } else {
                throw new Error(result.error?.message || "Failed to parse response. Verify your API key is correct.");
            }
        } catch (error) {
            alert("Error: " + error.message);
        } finally {
            generateBtn.disabled = false;
            statusMessage.style.display = 'none';
        }
    });

    // Clipboard Copy
    copyBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(altTextOutput.textContent).then(() => {
            const originalText = copyBtn.textContent;
            copyBtn.textContent = 'Copied!';
            setTimeout(() => {
                copyBtn.textContent = originalText;
            }, 2000);
        });
    });
</script>

</body>
</html>
