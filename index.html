<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI Image Alt Text Generator</title>
    <style>
        :root {
            --bg-color: #f4f6fa;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent: #2563eb; 
            --accent-hover: #1d4ed8;
            --accent-light: #eff6ff;
            --border: #e2e8f0;
            --success: #10b981;
            --radius-lg: 16px;
            --radius-md: 10px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at top right, #e0e7ff 0%, var(--bg-color) 40%);
            color: var(--text-main);
            margin: 0;
            padding: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            background: var(--card-bg);
            padding: 2.5rem 2rem;
            border-radius: var(--radius-lg);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 
                        0 8px 10px -6px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 520px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 1.85rem;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 0.5rem;
            text-align: center;
            background: linear-gradient(135deg, #1e3a8a 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 2.25rem;
            font-size: 0.95rem;
        }

        .config-section {
            margin-bottom: 1.75rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            color: #475569;
        }

        input[type="password"], input[type="text"] {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            box-sizing: border-box;
            font-size: 0.95rem;
            background-color: #f8fafc;
            transition: var(--transition);
        }

        input[type="password"]:focus, input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(37, 99, 233, 0.12);
        }

        .url-input-group {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .url-input-group input[type="text"] {
            flex: 1;
        }

        .url-input-group button {
            width: auto;
            padding: 0.85rem 1.25rem;
            white-space: nowrap;
        }

        .drop-zone {
            border: 2px dashed #cbd5e1;
            border-radius: var(--radius-lg);
            padding: 2.5rem 1.5rem;
            text-align: center;
            cursor: pointer;
            background-color: #f8fafc;
            transition: var(--transition);
            margin-bottom: 1.25rem;
        }

        .drop-zone:hover, .drop-zone.drag-over {
            border-color: var(--accent);
            background-color: var(--accent-light);
        }

        .divider {
            text-align: center;
            margin: 1.25rem 0;
            position: relative;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .divider::before, .divider::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background-color: var(--border);
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        #file-input { display: none; }

        #preview-container {
            display: none;
            margin-bottom: 1.75rem;
            text-align: center;
            border-radius: var(--radius-md);
            background-color: #f1f5f9;
            padding: 0.5rem;
            border: 1px solid var(--border);
        }

        #image-preview {
            display: block;
            max-width: 100%;
            max-height: 280px;
            margin: 0 auto;
            border-radius: calc(var(--radius-md) - 4px);
            object-fit: contain;
        }

        .action-btn {
            width: 100%;
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 0.95rem;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(37, 99, 233, 0.2);
            transition: var(--transition);
        }

        .action-btn:hover { background-color: var(--accent-hover); }
        .action-btn:disabled {
            background-color: #cbd5e1;
            color: #94a3b8;
            cursor: not-allowed;
            box-shadow: none;
        }

        #result-container {
            display: none;
            margin-top: 2rem;
            padding: 1.25rem 1.5rem;
            background-color: #f8fafc;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            border-left: 4px solid var(--accent);
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .copy-btn {
            background: none;
            color: var(--accent);
            border: none;
            font-weight: 600;
            cursor: pointer;
        }

        .status-message {
            text-align: center;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--accent);
            margin-top: 1.25rem;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Gemini Alt Image Text Generator</h1>
    <p class="subtitle">Get fast, contextual accessibility text powered by Google Gemini.</p>

    <div class="config-section">
        <label for="api-key">Gemini API Key:</label>
        <input type="password" id="api-key" placeholder="AIzaSy..." />
    </div>

    <div class="drop-zone" id="drop-zone">
        <p>Drag & drop your image here or <strong>browse</strong></p>
        <input type="file" id="file-input" accept="image/*">
    </div>

    <div class="divider">or</div>

    <div class="config-section">
        <label for="web-url-input">Load from Web Image URL:</label>
        <div class="url-input-group">
            <input type="text" id="web-url-input" placeholder="https://example.com/image.jpg" />
            <button id="fetch-url-btn" class="action-btn">Fetch Image</button>
        </div>
    </div>

    <div id="preview-container">
        <img id="image-preview" src="" alt="User uploaded preview">
    </div>

    <button id="generate-btn" class="action-btn" disabled>Generate Alt Text</button>

    <div class="status-message" id="status-message">Processing image payload...</div>

    <div id="result-container">
        <div class="result-header">
            <h3 style="margin:0; font-size:0.85rem; color:var(--text-muted);">Suggested Alt Text</h3>
            <button class="copy-btn" id="copy-btn">Copy</button>
        </div>
        <p id="alt-text-output"></p>
    </div>
</div>

<script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const webUrlInput = document.getElementById('web-url-input');
    const fetchUrlBtn = document.getElementById('fetch-url-btn');
    const previewContainer = document.getElementById('preview-container');
    const imagePreview = document.getElementById('image-preview');
    const generateBtn = document.getElementById('generate-btn');
    const statusMessage = document.getElementById('status-message');
    const resultContainer = document.getElementById('result-container');
    const altTextOutput = document.getElementById('alt-text-output');
    const copyBtn = document.getElementById('copy-btn');
    const apiKeyInput = document.getElementById('api-key');

    let selectedFile = null;

    dropZone.addEventListener('click', () => fileInput.click());

    ['dragenter', 'dragover'].forEach(eventName => {
        dropZone.addEventListener(eventName, (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });
    });

    ['dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
        });
    });

    dropZone.addEventListener('drop', async (e) => {
        e.preventDefault();
        const dt = e.dataTransfer;
        const files = dt.files;
        
        if (files.length) {
            handleFile(files[0]);
        } else {
            let imageUrl = dt.getData('text/uri-list');
            const html = dt.getData('text/html');

            if (!imageUrl && html) {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const img = doc.querySelector('img');
                if (img && img.src) imageUrl = img.src;
            }

            if (imageUrl) {
                webUrlInput.value = imageUrl;
                handleWebImageUrl(imageUrl);
            }
        }
    });

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length) handleFile(e.target.files[0]);
    });

    fetchUrlBtn.addEventListener('click', () => {
        const url = webUrlInput.value.trim();
        if (!url) return alert("Please enter a web image URL.");
        handleWebImageUrl(url);
    });

    function handleFile(file) {
        if (!file.type.startsWith('image/')) return alert('Please select an image file.');
        selectedFile = file;
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onloadend = () => {
            imagePreview.src = reader.result;
            previewContainer.style.display = 'block';
            generateBtn.disabled = false;
            resultContainer.style.display = 'none';
        }
    }

    async function handleWebImageUrl(url) {
        statusMessage.textContent = "Routing request through safe PHP server gateway...";
        statusMessage.style.display = 'block';
        previewContainer.style.display = 'none';
        resultContainer.style.display = 'none';
        generateBtn.disabled = true;

        try {
            // First attempt a direct lightweight cross-origin grab
            const base64Str = await convertImgToDataURL(url, true);
            imagePreview.src = base64Str;
            finalizeWebImage(url);
        } catch (directError) {
            console.warn("Direct browser fetch blocked by CORS. Diverting to local PHP handler...");
            
            try {
                // Secondary fallback: Send request to your script hidden inside the 'api/' directory
                const response = await fetch('api/fetch-image.php', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });
                
                if (!response.ok) throw new Error();
                const data = await response.json();
                
                imagePreview.src = data.dataURL;
                finalizeWebImage(url);
            } catch (backendError) {
                statusMessage.style.display = 'none';
                alert("Execution Fault: Your backend PHP handler script (api/fetch-image.php) could not process this resource.");
            }
        }
    }

    function finalizeWebImage(url) {
        let mimeType = 'image/jpeg';
        if (url.toLowerCase().includes('.png')) mimeType = 'image/png';
        else if (url.toLowerCase().includes('.webp')) mimeType = 'image/webp';
        
        selectedFile = { type: mimeType };
        previewContainer.style.display = 'block';
        generateBtn.disabled = false;
        statusMessage.style.display = 'none';
    }

    function convertImgToDataURL(url, directMode) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            if (directMode) img.crossOrigin = 'Anonymous';
            img.onload = function() {
                const canvas = document.createElement('canvas');
                canvas.width = this.naturalWidth;
                canvas.height = this.naturalHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(this, 0, 0);
                resolve(canvas.toDataURL('image/jpeg'));
            };
            img.onerror = () => reject(new Error());
            img.src = url;
        });
    }

    generateBtn.addEventListener('click', async () => {
        const apiKey = apiKeyInput.value.trim();
        if (!apiKey) return alert('Please enter your Gemini API Key.');

        generateBtn.disabled = true;
        statusMessage.textContent = "Gemini is looking closely at your image...";
        statusMessage.style.display = 'block';

        try {
            const base64Data = imagePreview.src.split(',')[1];
            const response = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${apiKey}`,
                {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "Provide a clean, concise, descriptive alt text phrase for this image for web accessibility purposes." },
                                { inline_data: { mime_type: selectedFile.type, data: base64Data } }
                            ]
                        }]
                    })
                }
            );

            const result = await response.json();
            if (response.ok && result.candidates?.[0]?.content?.parts?.[0]?.text) {
                altTextOutput.textContent = result.candidates[0].content.parts[0].text.trim().replace(/^["']|["']$/g, '');
                resultContainer.style.display = 'block';
            } else {
                throw new Error(result.error?.message || "Invalid API execution response.");
            }
        } catch (error) {
            alert("Error: " + error.message);
        } finally {
            generateBtn.disabled = false;
            statusMessage.style.display = 'none';
        }
    });

    copyBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(altTextOutput.textContent).then(() => {
            copyBtn.textContent = 'Copied!';
            setTimeout(() => copyBtn.textContent = 'Copy', 2000);
        });
    });
</script>

</body>
</html>
