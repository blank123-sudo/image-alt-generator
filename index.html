<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI Batch Alt Text Generator</title>
    <style>
        :root {
            --bg-color: #f1f5f9;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --primary-light: #eff6ff;
            --border: #e2e8f0;
            --success: #10b981;
            --error: #ef4444;
            --radius-xl: 20px;
            --radius-lg: 12px;
            --radius-md: 8px;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, #e0e7ff 0%, transparent 40%);
            color: var(--text-main);
            margin: 0;
            padding: 2rem 1rem;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        .app-wrapper {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            margin: 0 0 0.5rem 0;
            background: linear-gradient(135deg, #0f172a 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin: 0;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        @media (min-width: 860px) {
            .main-grid {
                grid-template-columns: 350px 1fr;
                gap: 2rem;
                align-items: stretch;
            }
        }

        .panel {
            background: var(--surface);
            padding: 2rem;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 8rem);
        }

        .input-group { margin-bottom: 1.5rem; }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            color: #334155;
        }

        input[type="password"] {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            box-sizing: border-box;
            font-size: 1rem;
            background-color: #f8fafc;
            transition: var(--transition);
        }

        input[type="password"]:focus {
            outline: none;
            border-color: var(--primary);
            background-color: var(--surface);
            box-shadow: 0 0 0 3px rgba(37, 99, 233, 0.15);
        }

        .help-text {
            display: block;
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .help-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .drop-zone {
            border: 2px dashed #cbd5e1;
            border-radius: var(--radius-lg);
            padding: 2.5rem 1.5rem;
            text-align: center;
            cursor: pointer;
            background-color: #f8fafc;
            transition: var(--transition);
            margin-bottom: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .drop-zone:hover, .drop-zone.drag-over {
            border-color: var(--primary);
            background-color: var(--primary-light);
        }

        .drop-zone p { margin: 0; color: var(--text-muted); font-size: 1rem; }
        .drop-zone strong { color: var(--primary); }
        #file-input { display: none; }

        .btn-group { display: flex; gap: 0.75rem; flex-direction: column; }

        button.primary-btn, button.secondary-btn {
            width: 100%;
            border: none;
            padding: 1rem;
            border-radius: var(--radius-md);
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        button.primary-btn {
            background-color: var(--primary);
            color: white;
            box-shadow: var(--shadow-sm);
        }

        button.primary-btn:hover:not(:disabled) {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        button.secondary-btn {
            background-color: #f1f5f9;
            color: #475569;
            display: none;
        }

        button.secondary-btn:hover:not(:disabled) { background-color: #e2e8f0; }

        button:disabled {
            background-color: #cbd5e1 !important;
            color: #94a3b8 !important;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .output-panel {
            background-color: #f8fafc;
            overflow-y: auto;
            padding: 1.5rem;
        }

        .output-panel::-webkit-scrollbar { width: 8px; }
        .output-panel::-webkit-scrollbar-track { background: transparent; }
        .output-panel::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
        }

        .empty-state {
            text-align: center;
            color: #94a3b8;
            font-size: 1rem;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 300px;
        }

        #gallery { display: flex; flex-direction: column; gap: 1.25rem; }

        .gallery-item {
            display: flex;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1rem;
            gap: 1.25rem;
            box-shadow: var(--shadow-sm);
            animation: slideIn 0.3s ease-out;
            position: relative;
        }

        @media (max-width: 600px) { .gallery-item { flex-direction: column; } }

        .item-thumb-container {
            flex-shrink: 0;
            width: 120px;
            height: 120px;
            border-radius: var(--radius-md);
            overflow: hidden;
            background-color: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 600px) {
            .item-thumb-container { width: 100%; height: 180px; }
        }

        .item-thumb { width: 100%; height: 100%; object-fit: cover; }
        .item-content { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .item-filename {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        .copy-btn {
            background: var(--primary-light);
            color: var(--primary);
            border: none;
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: none;
        }
        
        .copy-btn:hover {
            background-color: #dbeafe;
            color: var(--primary-hover);
        }

        .item-text-area {
            flex-grow: 1;
            font-size: 0.95rem;
            line-height: 1.5;
            color: var(--text-main);
            background-color: #f8fafc;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 0.75rem;
            word-wrap: break-word;
        }

        .item-status {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-style: italic;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            height: 100%;
            justify-content: center;
        }

        .item-status.error { color: var(--error); font-style: normal; }

        .remove-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-muted);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
        }

        .remove-btn:hover { color: var(--error); border-color: var(--error); }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="app-wrapper">
    <header>
        <h1>Batch Alt Text Generator</h1>
        <p class="subtitle">Upload multiple images. Get accessible descriptions powered by Gemini.</p>
    </header>

    <main class="main-grid">
        <div class="panel input-panel">
            <div class="input-group">
                <label for="api-key">API Key</label>
                <input type="password" id="api-key" placeholder="Enter your Gemini API key..." />
                <span class="help-text">Get a free key from <a href="https://aistudio.google.com/" target="_blank">Google AI Studio</a></span>
            </div>

            <div class="drop-zone" id="drop-zone">
                <p>Drag & drop images here or <strong>browse</strong></p>
                <input type="file" id="file-input" accept="image/*" multiple>
            </div>

            <div class="btn-group">
                <button id="generate-btn" class="primary-btn" disabled>Generate All Alt Text</button>
                <button id="clear-btn" class="secondary-btn">Clear All</button>
            </div>
        </div>

        <div class="panel output-panel">
            <div class="empty-state" id="empty-state">
                No images uploaded yet.<br>Upload one or more images to get started.
            </div>
            <div id="gallery"></div>
        </div>
    </main>
</div>

<script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const emptyState = document.getElementById('empty-state');
    const gallery = document.getElementById('gallery');
    const generateBtn = document.getElementById('generate-btn');
    const clearBtn = document.getElementById('clear-btn');
    const apiKeyInput = document.getElementById('api-key');

    let uploadedImages = [];

    // --- Drag & Drop & File Selection Logic ---
    dropZone.addEventListener('click', () => fileInput.click());

    ['dragenter', 'dragover'].forEach(eventName => {
        dropZone.addEventListener(eventName, (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });
    });

    ['dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
        });
    });

    dropZone.addEventListener('drop', (e) => {
        const files = Array.from(e.dataTransfer.files);
        handleFiles(files);
    });

    fileInput.addEventListener('change', (e) => {
        const files = Array.from(e.target.files);
        handleFiles(files);
        fileInput.value = ''; 
    });

    // --- Process Selected Files ---
    function handleFiles(files) {
        const imageFiles = files.filter(file => file.type.startsWith('image/'));
        
        if (imageFiles.length === 0) {
            alert('Please select valid image files.');
            return;
        }

        imageFiles.forEach(file => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onloadend = () => {
                const uniqueId = 'img-' + Math.random().toString(36).substr(2, 9);
                const imageData = {
                    id: uniqueId,
                    file: file,
                    base64: reader.result.split(',')[1],
                    mimeType: file.type,
                    previewUrl: reader.result,
                    status: 'pending' 
                };
                
                uploadedImages.push(imageData);
                renderGalleryItem(imageData);
                updateUIState();
            };
        });
    }

    // --- Render Individual Image Card ---
    function renderGalleryItem(imgData) {
        emptyState.style.display = 'none';

        const item = document.createElement('div');
        item.className = 'gallery-item';
        item.id = imgData.id;

        item.innerHTML = `
            <div class="remove-btn" onclick="removeImage('${imgData.id}')" title="Remove image">✕</div>
            <div class="item-thumb-container">
                <img src="${imgData.previewUrl}" class="item-thumb" alt="Upload preview">
            </div>
            <div class="item-content">
                <div class="item-header">
                    <span class="item-filename">${imgData.file.name}</span>
                    <button class="copy-btn" id="copy-${imgData.id}">Copy</button>
                </div>
                <div class="item-text-area" id="text-area-${imgData.id}">
                    <div class="item-status">Ready to generate...</div>
                </div>
            </div>
        `;

        gallery.appendChild(item);

        const copyBtn = item.querySelector(`#copy-${imgData.id}`);
        copyBtn.addEventListener('click', () => {
            const textToCopy = item.querySelector(`#text-area-${imgData.id}`).innerText;
            navigator.clipboard.writeText(textToCopy).then(() => {
                const originalText = copyBtn.textContent;
                copyBtn.textContent = 'Copied!';
                setTimeout(() => copyBtn.textContent = originalText, 2000);
            });
        });
    }

    window.removeImage = function(id) {
        uploadedImages = uploadedImages.filter(img => img.id !== id);
        const itemElement = document.getElementById(id);
        if (itemElement) itemElement.remove();
        updateUIState();
    };

    clearBtn.addEventListener('click', () => {
        uploadedImages = [];
        gallery.innerHTML = '';
        updateUIState();
    });

    function updateUIState() {
        if (uploadedImages.length > 0) {
            emptyState.style.display = 'none';
            generateBtn.disabled = false;
            generateBtn.textContent = `Generate All Alt Text (${uploadedImages.length})`;
            clearBtn.style.display = 'block';
        } else {
            emptyState.style.display = 'flex';
            generateBtn.disabled = true;
            generateBtn.textContent = 'Generate Alt Text';
            clearBtn.style.display = 'none';
        }
    }

    // --- Call Gemini API with Model Failover Routing ---
    generateBtn.addEventListener('click', async () => {
        const apiKey = apiKeyInput.value.trim();
        if (!apiKey) {
            alert('Please enter your Gemini API Key.');
            return;
        }

        generateBtn.disabled = true;
        clearBtn.disabled = true;
        generateBtn.textContent = 'Generating...';

        const getPayload = (base64Data, mimeType) => ({
            contents: [{
                parts: [
                    { text: "Provide a clean, concise, descriptive alt text phrase for this image for web accessibility purposes. Describe the focal point, setting, and text if present. Crucially: 1) DO NOT describe the color of any clothing worn by people, 2) DO NOT describe the ethnicity of any person, and 3) If depicting an older person, use the term 'elderly person' instead of 'senior'. Do not include commentary, labels, metadata, or introductory text like 'An image of...' or 'This image shows...'." },
                    { inline_data: { mime_type: mimeType, data: base64Data } }
                ]
            }]
        });

        // The Cascading Fallover Pool (Ordered from highest intelligence to high availability)
        const modelsPool = [
            'gemini-3.5-flash',
            'gemini-3.1-flash-lite',
            'gemini-2.5-flash',
            'gemini-2.5-flash-lite'
        ];

        // Process images one by one
        for (const img of uploadedImages) {
            if (img.status === 'completed') continue;

            const textArea = document.getElementById(`text-area-${img.id}`);
            const copyBtn = document.getElementById(`copy-${img.id}`);
            let targetCompleted = false;

            // Loop through our array of models until one accepts the request
            for (let i = 0; i < modelsPool.length; i++) {
                const currentModel = modelsPool[i];
                
                textArea.innerHTML = `
                    <div class="item-status">
                        <div class="spinner"></div> Routing to ${currentModel}...
                    </div>`;

                try {
                    const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/${currentModel}:generateContent?key=${apiKey}`;
                    
                    const options = {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(getPayload(img.base64, img.mimeType))
                    };

                    const response = await fetch(apiUrl, options);
                    const result = await response.json();

                    // 1. SUCCESS: Set text and break out of the model pool loop
                    if (response.ok && result.candidates) {
                        let altText = result.candidates[0].content.parts[0].text.trim();
                        altText = altText.replace(/^["']|["']$/g, ''); 
                        
                        textArea.textContent = altText;
                        copyBtn.style.display = 'block'; 
                        img.status = 'completed';
                        targetCompleted = true;
                        break; 
                    }

                    // 2. HARD CONFIG ERROR: If API key is bad, don't loop models, just stop.
                    const errorMsg = result.error?.message?.toLowerCase() || "";
                    if (response.status === 400 || response.status === 403 || errorMsg.includes("api key")) {
                        throw new Error(result.error?.message || "API Key Error");
                    }

                    // 3. SERVER BUSY/QUOTA: Log the fallback event in the UI and let the loop continue to next model
                    textArea.innerHTML = `
                        <div class="item-status" style="color: #d97706;">
                            <div class="spinner" style="border-top-color: #d97706;"></div> 
                            ${currentModel} busy. Dropping to fallback...
                        </div>`;
                    
                    // Wait 1 second before trying the fallback model to let networks breathe
                    await new Promise(resolve => setTimeout(resolve, 1000));

                } catch (error) {
                    if (error.message.includes("API Key Error")) {
                        textArea.innerHTML = `<div class="item-status error">Configuration Error: ${error.message}</div>`;
                        img.status = 'error';
                        targetCompleted = false;
                        break; // Stop completely for bad keys
                    }
                    console.warn(`${currentModel} failed, trying next fallback.`, error);
                }
            }

            // If the code cycled through all models and nothing responded successfully
            if (!targetCompleted && img.status !== 'error') {
                textArea.innerHTML = `<div class="item-status error">Error: All free models are currently overloaded.</div>`;
                img.status = 'error';
            }

            // 3-second recovery delay between distinct images to prevent rapid gateway blocking
            await new Promise(resolve => setTimeout(resolve, 3000));
        }

        updateUIState();
        clearBtn.disabled = false;
    });
</script>

</body>
</html>
